<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Players 2026 — AI 주도 기업 10선</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0f;--bg2:#131316;--bg3:#1a1a1f;--bg4:#222228;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#f0eff5;--text2:#9998a8;--text3:#5e5d6e;
    --accent:#7c6fff;--accent2:#a89bff;
    --b-llm:#1e3a5f;--t-llm:#93c5fd;
    --b-img:#14532d;--t-img:#86efac;
    --b-vid:#431407;--t-vid:#fdba74;
    --b-agt:#2e1065;--t-agt:#c4b5fd;
    --b-hw:#1c1c24;--t-hw:#94a3b8;
    --b-code:#500724;--t-code:#f9a8d4;
    --b-sci:#042f2e;--t-sci:#5eead4;
    --b-ui:#1a2e1a;--t-ui:#bbf7d0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:400;min-height:100vh;-webkit-font-smoothing:antialiased;}
  header{padding:56px 40px 40px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
  header::before{content:'';position:absolute;top:-60px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(124,111,255,0.12) 0%,transparent 70%);pointer-events:none;}
  header::after{content:'';position:absolute;bottom:-40px;right:10%;width:300px;height:300px;background:radial-gradient(circle,rgba(45,212,191,0.07) 0%,transparent 70%);pointer-events:none;}
  .header-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.18em;color:var(--accent2);text-transform:uppercase;margin-bottom:14px;}
  h1{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,48px);font-weight:800;line-height:1.15;letter-spacing:-0.02em;margin-bottom:10px;}
  .header-sub{font-size:14px;color:var(--text2);line-height:1.7;max-width:580px;}
  .updates-panel{padding:20px 40px;border-bottom:1px solid var(--border);background:var(--bg2);}
  .updates-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .updates-date{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--accent2);letter-spacing:0.04em;}
  .updates-label{font-size:11px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;}
  .updates-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
  .updates-list li{font-size:12.5px;color:var(--text2);line-height:1.65;padding-left:14px;position:relative;}
  .updates-list li::before{content:'';position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:0.6;}
  .updates-toggle{display:inline-flex;align-items:center;gap:4px;margin-top:10px;font-size:12px;color:var(--accent2);background:none;border:1px solid rgba(124,111,255,0.25);padding:4px 12px;border-radius:999px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.18s;}
  .updates-toggle:hover{background:rgba(124,111,255,0.1);border-color:rgba(124,111,255,0.4);}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:16px 40px;border-bottom:1px solid var(--border);background:rgba(19,19,22,0.92);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
  .filter-label{font-size:11px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-right:4px;white-space:nowrap;}
  .tag{font-size:12px;font-weight:500;padding:5px 14px;border-radius:999px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;background:transparent;transition:all 0.18s;font-family:'Noto Sans KR',sans-serif;}
  .tag:hover{border-color:rgba(255,255,255,0.25);color:var(--text);}
  .tag.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  main{padding:28px 40px 80px;}
  .company-block{display:grid;grid-template-columns:72px 200px 1fr;border:1px solid var(--border);border-radius:16px;margin-bottom:14px;background:var(--bg2);overflow:hidden;transition:border-color 0.2s,transform 0.2s;animation:fadeUp 0.35s ease both;}
  .company-block:hover{border-color:var(--border2);transform:translateY(-1px);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .col-rank{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:22px 0;border-right:1px solid var(--border);background:var(--bg3);}
  .rank-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--text3);line-height:1;}
  .col-company{padding:18px 18px 18px 22px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:7px;min-width:0;}
  .co-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.01em;}
  .co-name a{color:var(--text);text-decoration:none;transition:color 0.15s;display:inline-flex;align-items:center;gap:5px;}
  .co-name a:hover{color:var(--accent2);}
  .co-name a .ext{font-size:11px;opacity:0;transition:opacity 0.15s;color:var(--accent2);}
  .co-name a:hover .ext{opacity:1;}
  .co-type{font-size:11px;color:var(--text3);line-height:1.5;}
  .co-focus{margin-top:4px;font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg4);color:var(--accent2);display:inline-block;line-height:1.4;border:1px solid rgba(124,111,255,0.2);word-break:keep-all;}
  .col-products{padding:18px 22px;}
  .prod-item{padding:11px 0;border-bottom:1px solid var(--border);}
  .prod-item:last-child{border-bottom:none;padding-bottom:0;}
  .prod-item:first-child{padding-top:0;}
  .prod-header{display:flex;align-items:flex-start;gap:7px;flex-wrap:wrap;margin-bottom:5px;}
  .prod-name-link{font-size:13px;font-weight:500;font-family:'Syne',sans-serif;letter-spacing:-0.01em;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color 0.15s;}
  .prod-name-link:hover{color:var(--accent2);}
  .prod-name-link .ext{font-size:10px;opacity:0;transition:opacity 0.15s;color:var(--accent2);}
  .prod-name-link:hover .ext{opacity:1;}
  .new-dot{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;background:rgba(45,212,191,0.15);color:#2dd4bf;border:1px solid rgba(45,212,191,0.3);vertical-align:middle;margin-left:2px;}
  .prod-desc{font-size:12.5px;color:var(--text2);line-height:1.75;word-break:keep-all;}
  .badge{display:inline-flex;align-items:center;font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:999px;white-space:nowrap;}
  .b-llm{background:var(--b-llm);color:var(--t-llm);}
  .b-img{background:var(--b-img);color:var(--t-img);}
  .b-vid{background:var(--b-vid);color:var(--t-vid);}
  .b-agt{background:var(--b-agt);color:var(--t-agt);}
  .b-hw{background:var(--b-hw);color:var(--t-hw);}
  .b-code{background:var(--b-code);color:var(--t-code);}
  .b-sci{background:var(--b-sci);color:var(--t-sci);}
  .b-ui{background:var(--b-ui);color:var(--t-ui);}
  .empty{text-align:center;padding:80px 20px;color:var(--text3);font-size:14px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px;padding:14px 40px;border-top:1px solid var(--border);background:var(--bg2);}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);}
  @media(max-width:900px){header,main,.toolbar,.legend,.updates-panel{padding-left:20px;padding-right:20px;}.company-block{grid-template-columns:48px 160px 1fr;}.rank-num{font-size:20px;}}
  @media(max-width:640px){.company-block{grid-template-columns:1fr;}.col-rank{flex-direction:row;padding:12px 16px;gap:8px;border-right:none;border-bottom:1px solid var(--border);}.col-company{border-right:none;border-bottom:1px solid var(--border);}}
</style>
</head>
<body>
<header>
  <div class="header-label" id="header-label"></div>
  <h1 id="header-title"></h1>
  <p class="header-sub" id="header-sub"></p>
</header>
<section class="updates-panel" id="updates-panel"></section>
<nav class="toolbar" id="toolbar">
  <span class="filter-label">필터</span>
  <button class="tag active" data-cat="all">전체</button>
  <button class="tag" data-cat="llm">LLM</button>
  <button class="tag" data-cat="img">이미지</button>
  <button class="tag" data-cat="vid">비디오</button>
  <button class="tag" data-cat="agt">에이전트</button>
  <button class="tag" data-cat="code">코딩</button>
  <button class="tag" data-cat="ui">UI 디자인</button>
  <button class="tag" data-cat="hw">하드웨어</button>
  <button class="tag" data-cat="sci">과학 AI</button>
</nav>
<main id="main"></main>
<footer class="legend">
  <div class="legend-item"><span class="badge b-llm">LLM</span>언어 모델</div>
  <div class="legend-item"><span class="badge b-img">이미지</span>이미지 생성</div>
  <div class="legend-item"><span class="badge b-vid">비디오</span>동영상 생성</div>
  <div class="legend-item"><span class="badge b-agt">에이전트</span>자율 에이전트</div>
  <div class="legend-item"><span class="badge b-code">코딩</span>코드 특화</div>
  <div class="legend-item"><span class="badge b-ui">UI 디자인</span>UI/디자인 AI</div>
  <div class="legend-item"><span class="badge b-hw">하드웨어</span>AI 칩·인프라</div>
  <div class="legend-item"><span class="badge b-sci">과학AI</span>과학·연구 AI</div>
</footer>
<script src="data.js"></script>
<script src="updates.js"></script>
<script>
function badges(arr){return arr.map(c=>`<span class="badge b-${c}">${BL[c]||c}</span>`).join('');}
function render(cat){
  const main=document.getElementById('main');
  let html='';let r=1;
  data.forEach(co=>{
    const prods=cat==='all'?co.products:co.products.filter(p=>p.badges.includes(cat));
    if(!prods.length)return;
    html+=`<div class="company-block" style="animation-delay:${(r-1)*0.04}s">
      <div class="col-rank"><span class="rank-num">${String(r).padStart(2,'0')}</span></div>
      <div class="col-company">
        <div class="co-name"><a href="${co.url}" target="_blank" rel="noopener">${co.name}<span class="ext">↗</span></a></div>
        <div class="co-type">${co.type}</div>
        <div class="co-focus">${co.focus}</div>
      </div>
      <div class="col-products">
        ${prods.map(p=>`<div class="prod-item">
          <div class="prod-header">
            <a class="prod-name-link" href="${p.url}" target="_blank" rel="noopener">${p.name}${p.isNew?'<span class="new-dot">NEW</span>':''}<span class="ext">↗</span></a>
            ${badges(p.badges)}
          </div>
          <div class="prod-desc">${p.desc}</div>
        </div>`).join('')}
      </div>
    </div>`;
    r++;
  });
  if(!html)html='<div class="empty">해당 카테고리의 프로그램이 없습니다.</div>';
  main.innerHTML=html;
}
document.getElementById('toolbar').addEventListener('click',e=>{
  const btn=e.target.closest('[data-cat]');
  if(!btn)return;
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render(btn.dataset.cat);
});
render('all');
document.getElementById('header-label').textContent = META.year + ' · AI Players';
document.getElementById('header-title').textContent = 'AI Players ' + META.year;
document.getElementById('header-sub').innerHTML = META.year + '년 ' + META.month + '월 기준, AI 개발·인프라·통합을 주도하는 핵심 기업과 프로그램·제품 총망라. <span style="color:var(--accent2)">NEW</span> 표시는 ' + META.year + '년 ' + META.month + '월 신규 출시·업데이트 항목. 기업명 및 제품명 클릭 시 공식 페이지로 이동.';
document.title = 'AI Players ' + META.year + ' — AI 주도 기업 10선';

/* --- Updates panel --- */
(function(){
  if(typeof UPDATES==='undefined'||!UPDATES.length)return;
  var latest=UPDATES[0], entries=latest.entries, max=4;
  var panel=document.getElementById('updates-panel');
  var html='<div class="updates-header"><span class="updates-label">Latest Updates</span><span class="updates-date">'+latest.date+'</span></div>';
  html+='<ul class="updates-list">';
  entries.forEach(function(e,i){
    html+='<li'+(i>=max?' style="display:none" data-extra':'')+'>' + e + '</li>';
  });
  html+='</ul>';
  if(entries.length>max){
    var rest=entries.length-max;
    html+='<button class="updates-toggle" id="updates-toggle">외 '+rest+'건 ▸ 더보기</button>';
  }
  panel.innerHTML=html;
  var btn=document.getElementById('updates-toggle');
  if(btn){
    var expanded=false;
    btn.addEventListener('click',function(){
      expanded=!expanded;
      var extras=panel.querySelectorAll('[data-extra]');
      for(var i=0;i<extras.length;i++) extras[i].style.display=expanded?'':'none';
      btn.textContent=expanded?'간단히 ◂':'외 '+(entries.length-max)+'건 ▸ 더보기';
    });
  }
})();
</script>
</body>
</html>
